<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
    <title>{% block title %}Sawasdee{% endblock %} — Sawasdee</title>
    <link rel="stylesheet" href="/static/css/style.css?v=20260625-reference-shell">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='28' fill='%23070B18'/%3E%3Cpath d='M18 33C43 20 73 28 102 24 91 36 77 41 62 41H47L32 94V43H18Z' fill='none' stroke='%2300F0FF' stroke-width='6' stroke-linejoin='round'/%3E%3Cpath d='M57 41H94L80 94V48H63Z' fill='none' stroke='%23FF4D9B' stroke-width='6' stroke-linejoin='round'/%3E%3Cpath d='M84 84h18' stroke='%23FFC77A' stroke-width='4'/%3E%3C/svg%3E">
    {% block head %}{% endblock %}
</head>
<body data-theme="orchid">
    {% block navbar %}{% endblock %}
    <div class="toast-container" id="toastContainer"></div>
    {% block content %}{% endblock %}
    <!-- Mobile Bottom Nav -->
    {% block mobile_nav %}
    <nav class="mobile-nav" id="mobileNav">
        <a href="/explore" class="mobile-nav-link" data-page="explore">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span>探索</span>
        </a>
        <a href="/gatherings" class="mobile-nav-link" data-page="gatherings" style="position:relative;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>組局</span>
            <span class="mobile-nav-badge hidden">0</span>
        </a>
        <a href="/feed" class="mobile-nav-link" data-page="feed">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            <span>動態</span>
        </a>
        <a href="/messages" class="mobile-nav-link" data-page="messages">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>訊息</span>
        </a>
        <a href="#" class="mobile-nav-link" data-page="me" onclick="goToProfile(); return false;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>我的</span>
        </a>
    </nav>
    {% endblock %}
    <script src="/static/js/api.js?v=20260504b"></script>
    <script>
    // Highlight active mobile nav
    (function(){
        const path = window.location.pathname;
        document.querySelectorAll('.mobile-nav-link').forEach(link => {
            const page = link.dataset.page;
            if(path.startsWith('/' + page) || (page === 'me' && path.startsWith('/profile'))) {
                link.classList.add('active');
            }
        });
        // Hide mobile nav on landing/login/register only — keep it on /chat/*
        // so the chat sits above the nav (not on top of it).
        if(['/', '/login', '/register'].includes(path)) {
            const mn = document.getElementById('mobileNav');
            if(mn) mn.style.display = 'none';
        }
    })();

    // ─────────────────────────────────────────────────────────────────
    // Combined background poller — ONE round trip every 1.2s for:
    //   • Host: pending gathering-request count → 組局 nav badge + toast
    //   • Applicant: own request status changes → approve/reject toast
    //   • Bell: unread notification count → 鈴鐺 badge
    // Used to be 3 separate setIntervals hitting 3 endpoints. Combining
    // them cuts ~66% of network round-trips and DB connections without
    // changing user-visible cadence.
    // ─────────────────────────────────────────────────────────────────
    (function(){
        const path = window.location.pathname;
        if(['/', '/login', '/register'].includes(path)) return;
        if(!localStorage.getItem('token')) return;

        function authedFetch(url, opts={}){
            return fetch(url, { ...opts, headers: { ...(opts.headers || {}), 'Authorization': 'Bearer ' + localStorage.getItem('token') } });
        }

        let lastPendingCount = parseInt(sessionStorage.getItem('sw_pending_count') || '0', 10) || 0;

        function applyPendingBadge(n) {
            document.querySelectorAll('[data-page="gatherings"] .nav-badge, [data-page="gatherings"] .mobile-nav-badge')
                .forEach(el => {
                    if (n > 0) {
                        el.textContent = n > 9 ? '9+' : String(n);
                        el.classList.remove('hidden');
                    } else {
                        el.classList.add('hidden');
                    }
                });
            if (n > lastPendingCount) {
                const delta = n - lastPendingCount;
                if (window.showToast) showToast(`🔔 你有 ${delta} 個新的入局申請`, 'success');
            }
            lastPendingCount = n;
            sessionStorage.setItem('sw_pending_count', String(n));
        }

        function applyNotifBadge(n) {
            document.querySelectorAll('#notifBadge').forEach(el => {
                if (n > 0) {
                    el.textContent = n > 99 ? '99+' : String(n);
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });
        }

        function readSeenStatus(){
            try { return JSON.parse(sessionStorage.getItem('sw_my_req_status') || '{}'); }
            catch (_) { return {}; }
        }
        function writeSeenStatus(map){
            sessionStorage.setItem('sw_my_req_status', JSON.stringify(map));
        }
        function diffMyRequests(reqs) {
            const seen = readSeenStatus();
            const next = {};
            for (const req of reqs) {
                next[req.id] = req.status;
                const prev = seen[req.id];
                if (prev && prev !== req.status) {
                    if (req.status === 'approved') {
                        const goChat = `<a href="/gatherings/${req.gathering.id}/chat" style="color:inherit; text-decoration:underline; font-weight:700;">進入聊天 →</a>`;
                        if (window.showToast) showToast(
                            `🎉 「${req.gathering.title}」核准你的申請! · ${goChat}`,
                            'success', { html: true, duration: 6000 }
                        );
                        const here = window.location.pathname;
                        if (here.startsWith('/gatherings') && !here.endsWith('/chat')) {
                            setTimeout(() => { window.location.href = `/gatherings/${req.gathering.id}/chat`; }, 1500);
                        }
                    } else if (req.status === 'rejected') {
                        if (window.showToast) showToast(`「${req.gathering.title}」未通過你的申請`, 'error');
                    }
                }
            }
            writeSeenStatus(next);
        }

        let inFlight = false;
        async function tick(){
            if (inFlight) return;
            inFlight = true;
            try {
                const r = await authedFetch('/api/poll');
                if (!r.ok) return;
                const data = await r.json();
                applyPendingBadge(data.gathering_pending || 0);
                applyNotifBadge(data.notif_unread || 0);
                diffMyRequests(data.my_requests || []);
            } catch (e) { /* ignore — next tick retries */ }
            finally { inFlight = false; }
        }
        tick();
        // 1.2s combined poll. Single round trip → cheaper than the old 3×.
        setInterval(tick, 1200);

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') tick();
        });
    })();

    // ─────────────────────────────────────────────────────────────────
    // Notification drawer — open/close, populate on open, mark-read.
    // The bell BADGE count is updated by the combined poller above; this
    // block only handles user interactions with the drawer itself.
    // ─────────────────────────────────────────────────────────────────
    (function(){
        const path = window.location.pathname;
        if(['/', '/login', '/register'].includes(path)) return;
        if(!localStorage.getItem('token')) return;

        function authedFetch(url, opts={}){
            return fetch(url, { ...opts, headers: { ...(opts.headers || {}), 'Authorization': 'Bearer ' + localStorage.getItem('token') } });
        }

        // Re-trigger the combined poll's badge refresh after mark-all-read
        function refreshNotifBadge() {
            authedFetch('/api/poll').then(r => r.ok ? r.json() : null).then(data => {
                if (!data) return;
                const n = data.notif_unread || 0;
                document.querySelectorAll('#notifBadge').forEach(el => {
                    if (n > 0) { el.textContent = n > 99 ? '99+' : String(n); el.classList.remove('hidden'); }
                    else el.classList.add('hidden');
                });
            });
        }

        async function loadNotifList(){
            const list = document.getElementById('notifDrawerList');
            if (!list) return;
            try {
                const r = await authedFetch('/api/notifications');
                if (!r.ok) throw 0;
                const data = await r.json();
                const rows = data.notifications || [];
                if (rows.length === 0) {
                    list.innerHTML = '<div class="text-muted" style="padding:1.5rem; text-align:center;">尚無通知</div>';
                    return;
                }
                list.innerHTML = rows.map(n => {
                    const ts = window.timeAgo ? window.timeAgo(n.created_at) : '';
                    const av = n.actor && n.actor.avatar_url
                        ? `<img src="${n.actor.avatar_url}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;">`
                        : `<div style="width:34px;height:34px;border-radius:50%;background:var(--gradient-gold);flex-shrink:0;"></div>`;
                    const safeTitle = (n.title || '').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c]);
                    return `
                        <a class="notif-row${n.is_read ? '' : ' unread'}" href="${n.link || '#'}" data-nid="${n.id}">
                            ${av}
                            <div style="flex:1; min-width:0;">
                                <div class="notif-title">${safeTitle}</div>
                                <div class="notif-time">${ts}</div>
                            </div>
                        </a>`;
                }).join('');
                list.querySelectorAll('.notif-row').forEach(el => {
                    el.addEventListener('click', () => {
                        const id = el.getAttribute('data-nid');
                        if (id) authedFetch(`/api/notifications/${id}/read`, { method: 'POST' });
                    });
                });
            } catch (e) {
                list.innerHTML = '<div class="text-muted" style="padding:1.5rem; text-align:center;">載入失敗</div>';
            }
        }

        window.toggleNotifDrawer = function(ev){
            if (ev) { ev.stopPropagation(); ev.preventDefault(); }
            const d = document.getElementById('notifDrawer');
            if (!d) return;
            const wasHidden = d.classList.contains('hidden');
            d.classList.toggle('hidden');
            if (wasHidden) loadNotifList();
        };

        window.markAllNotifsRead = async function(){
            try {
                await authedFetch('/api/notifications/mark-all-read', { method: 'POST' });
                refreshNotifBadge();
                loadNotifList();
            } catch (e) {}
        };

        // Click-outside closes drawer
        document.addEventListener('click', (e) => {
            const d = document.getElementById('notifDrawer');
            const b = document.getElementById('navBellBtn');
            if (d && b && !d.classList.contains('hidden')
                && !d.contains(e.target) && !b.contains(e.target)) {
                d.classList.add('hidden');
            }
        });
    })();
    </script>
    <script>
      /* The original templates were authored with an incompatible encoding.
         Keep mobile navigation readable while legacy page templates are moved
         to UTF-8 incrementally. */
      document.querySelectorAll('.mobile-nav-link').forEach((link) => {
        const label = ({explore:'探索', gatherings:'聚會', feed:'動態', messages:'訊息', me:'我的'})[link.dataset.page];
        const text = link.querySelector('span:not(.mobile-nav-badge)');
        if (text && label) text.textContent = label;
      });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
