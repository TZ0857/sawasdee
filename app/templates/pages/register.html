{% extends "components/base.html" %}
{% block title %}註冊{% endblock %}
{% block mobile_nav %}{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card" style="max-width:520px">
        <h1 class="auth-title">加入 Sawasdee</h1>
        <p class="auth-subtitle">建立你的會員檔案，開始遇見更有質感的連結。</p>
        <form id="registerForm">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="form-group">
                    <label class="form-label">顯示名稱</label>
                    <input type="text" class="form-input" id="regName" placeholder="你的暱稱" required>
                </div>
                <div class="form-group">
                    <label class="form-label">用戶名</label>
                    <input type="text" class="form-input" id="regUsername" placeholder="username" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="regEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">密碼</label>
                <input type="password" class="form-input" id="regPassword" placeholder="至少6個字元" required minlength="6">
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="form-group">
                    <label class="form-label">性別</label>
                    <select class="form-select" id="regGender" required>
                        <option value="">選擇性別</option>
                        <option value="male">男生 (台灣)</option>
                        <option value="female">女生 (泰國)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">年齡</label>
                    <input type="number" class="form-input" id="regAge" placeholder="25" min="18" max="80">
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="form-group">
                    <label class="form-label">身高 (cm)</label>
                    <input type="number" class="form-input" id="regHeight" placeholder="170" step="0.1">
                </div>
                <div class="form-group">
                    <label class="form-label">體重 (kg)</label>
                    <input type="number" class="form-input" id="regWeight" placeholder="65" step="0.1">
                </div>
            </div>
            <div class="form-group hidden" id="cupSizeGroup">
                <label class="form-label">罩杯</label>
                <select class="form-select" id="regCupSize">
                    <option value="">選擇罩杯</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                    <option value="F+">F+</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">興趣</label>
                <input type="text" class="form-input" id="regInterests" placeholder="旅遊, 美食, 音樂...">
            </div>
            <div class="form-group">
                <label class="form-label">自我介紹</label>
                <textarea class="form-textarea" id="regBio" placeholder="說說你自己..." rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">建立帳號</button>
        </form>
        <p class="auth-footer">已有帳號？ <a href="/login">登入</a></p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('regGender').addEventListener('change', (e) => {
    document.getElementById('cupSizeGroup').classList.toggle('hidden', e.target.value !== 'female');
});
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = '建立中...';
    const gender = document.getElementById('regGender').value;
    try {
        const data = await api.post('/api/auth/register', {
            email: document.getElementById('regEmail').value,
            username: document.getElementById('regUsername').value,
            password: document.getElementById('regPassword').value,
            display_name: document.getElementById('regName').value,
            gender: gender,
            nationality: gender === 'male' ? 'taiwanese' : 'thai',
            age: parseInt(document.getElementById('regAge').value) || null,
            height: parseFloat(document.getElementById('regHeight').value) || null,
            weight: parseFloat(document.getElementById('regWeight').value) || null,
            interests: document.getElementById('regInterests').value,
            bio: document.getElementById('regBio').value,
            cup_size: gender === 'female' ? document.getElementById('regCupSize').value : '',
        });
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast('註冊成功！', 'success');
        setTimeout(() => window.location.href = '/explore', 500);
    } catch (err) {
        showToast(err.message || '註冊失敗', 'error');
        btn.disabled = false; btn.textContent = '建立帳號';
    }
});
</script>
{% endblock %}
