{% extends "components/base.html" %}
{% block title %}加入 TT{% endblock %}
{% block mobile_nav %}{% endblock %}
{% block content %}
<main class="auth-page tt-register-page"><section class="auth-card tt-register-card">
  <div class="tt-kicker">TAIWAN × THAILAND · ONE VIBE</div>
  <h1 class="auth-title">加入 <span class="tt-mark">TT</span></h1>
  <p class="auth-subtitle">建立你的專屬名片，從一個真實的自我介紹開始認識新朋友。</p>
  <form id="registerForm">
    <div class="form-grid"><div class="form-group"><label class="form-label" for="regName">顯示名稱</label><input type="text" class="form-input" id="regName" placeholder="你想被怎麼稱呼？" required></div><div class="form-group"><label class="form-label" for="regUsername">使用者名稱</label><input type="text" class="form-input" id="regUsername" placeholder="username" required></div></div>
    <div class="form-group"><label class="form-label" for="regEmail">Email</label><input type="email" class="form-input" id="regEmail" placeholder="your@email.com" required></div>
    <div class="form-group"><label class="form-label" for="regPassword">密碼</label><input type="password" class="form-input" id="regPassword" placeholder="至少 6 個字元" required minlength="6"></div>
    <div class="form-grid"><div class="form-group"><label class="form-label" for="regGender">性別</label><select class="form-select" id="regGender" required><option value="">請選擇</option><option value="male">男性</option><option value="female">女性</option><option value="other">其他</option></select></div><div class="form-group"><label class="form-label" for="regAge">年齡</label><input type="number" class="form-input" id="regAge" placeholder="25" min="18" max="80"></div></div>
    <div class="form-grid"><div class="form-group"><label class="form-label" for="regHeight">身高（cm）</label><input type="number" class="form-input" id="regHeight" placeholder="170" step=".1"></div><div class="form-group"><label class="form-label" for="regWeight">體重（kg）</label><input type="number" class="form-input" id="regWeight" placeholder="60" step=".1"></div></div>
    <div class="form-group hidden" id="cupSizeGroup"><label class="form-label" for="regCupSize">罩杯（選填）</label><select class="form-select" id="regCupSize"><option value="">不想透露</option><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F+</option></select></div>
    <div class="form-group"><label class="form-label" for="regInterests">興趣</label><input type="text" class="form-input" id="regInterests" placeholder="旅行、美食、瑜伽、攝影（以逗號分隔）"></div>
    <div class="form-group"><label class="form-label" for="regBio">關於你</label><textarea class="form-textarea" id="regBio" placeholder="用幾句話，讓對的人認識你。" rows="3"></textarea></div>
    <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">建立我的 TT 檔案</button>
  </form>
  <p class="auth-footer">已經是會員了嗎？ <a href="/login">登入</a></p>
</section></main>
{% endblock %}
{% block scripts %}<script>
document.getElementById('regGender').addEventListener('change', e => document.getElementById('cupSizeGroup').classList.toggle('hidden', e.target.value !== 'female'));
document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault(); const btn = e.target.querySelector('button[type=submit]'); btn.disabled = true; btn.textContent = '正在建立檔案…';
  const gender = document.getElementById('regGender').value;
  try {
    const data = await api.post('/api/auth/register', {email:document.getElementById('regEmail').value,username:document.getElementById('regUsername').value,password:document.getElementById('regPassword').value,display_name:document.getElementById('regName').value,gender,age:parseInt(document.getElementById('regAge').value)||null,height:parseFloat(document.getElementById('regHeight').value)||null,weight:parseFloat(document.getElementById('regWeight').value)||null,interests:document.getElementById('regInterests').value,bio:document.getElementById('regBio').value,cup_size:gender==='female'?document.getElementById('regCupSize').value:''});
    localStorage.setItem('token', data.access_token); localStorage.setItem('user', JSON.stringify(data.user)); showToast('歡迎加入 Sawasdee！', 'success'); setTimeout(() => location.href='/explore', 500);
  } catch(err) { showToast(err.message || '註冊失敗，請稍後再試。', 'error'); btn.disabled=false; btn.textContent='建立我的 TT 檔案'; }
});
</script>{% endblock %}
