{% extends "components/base.html" %}
{% block title %}訊息{% endblock %}
{% block navbar %}{% include "components/navbar.html" %}{% endblock %}
{% block content %}
<div class="main-content">
    <div class="messages-layout">
        <div class="conversations-list" id="conversationsList">
            <h3 style="padding:0.5rem; margin-bottom:0.5rem; font-family:var(--font-heading)">訊息</h3>
            <div id="convListContent">
                <div class="flex-center" style="padding:2rem"><div class="spinner"></div></div>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="flex-center" style="flex:1; color:var(--text-muted)">
                <div class="text-center">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="color:var(--text-muted); margin-bottom:1rem"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <p>選擇一個對話開始聊天</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/messages.js"></script>
{% endblock %}
