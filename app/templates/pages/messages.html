{% extends "components/base.html" %}
{% block title %}訊息{% endblock %}
{% block navbar %}{% include "components/navbar.html" %}{% endblock %}
{% block content %}
<div class="main-content">
    <div class="messages-layout">
        <div class="conversations-list" id="conversationsList">
            <h3 style="padding:0.5rem; margin-bottom:0.5rem; font-family:var(--font-heading)">訊息</h3>
            <!-- Search -->
            <div style="padding:0 0.5rem 0.75rem;">
                <input type="text" class="form-input" id="convSearch" placeholder="搜尋對話..." style="font-size:0.85rem; padding:0.5rem 0.75rem;">
            </div>
            <!-- Tabs -->
            <div style="display:flex; gap:0.25rem; padding:0 0.5rem 0.75rem;">
                <button class="chip active" style="font-size:0.75rem; padding:0.3rem 0.75rem;" onclick="filterConv('all')">全部</button>
                <button class="chip" style="font-size:0.75rem; padding:0.3rem 0.75rem;" onclick="filterConv('unread')">未讀</button>
            </div>
            <div id="convListContent">
                <div class="flex-center" style="padding:2rem"><div class="spinner"></div></div>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="flex-center" style="flex:1; color:var(--text-muted)">
                <div class="empty-state" style="border:none; background:none;">
                    <div class="empty-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="color:var(--text-muted)"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <div class="empty-title">還沒有開始對話</div>
                    <div class="empty-desc">去探索頁找到感興趣的人，送出第一句招呼。</div>
                    <a href="/explore" class="btn btn-primary btn-sm">前往探索</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/messages.js?v=20260504b"></script>
{% endblock %}
