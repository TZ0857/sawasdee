{% extends "components/base.html" %}
{% block title %}訊息{% endblock %}
{% block navbar %}{% include "components/navbar.html" %}{% endblock %}
{% block content %}
<div class="main-content">
    <div class="messages-layout">
        <div class="conversations-list" id="conversationsList">
            <h3 class="tt-grad" style="padding:0.5rem; margin-bottom:0.5rem; font-size:1.5rem; font-weight:700;">訊息</h3>
            <!-- Search -->
            <div style="padding:0 0.5rem 0.75rem;">
                <input type="text" class="form-input" id="convSearch" placeholder="搜尋對話..." style="font-size:0.85rem; padding:0.5rem 0.75rem;">
            </div>
            <!-- Tabs -->
            <div style="display:flex; gap:0.25rem; padding:0 0.5rem 0.75rem;">
                <button class="chip active" style="font-size:0.75rem; padding:0.3rem 0.75rem;" onclick="filterConv('all', this)">全部</button>
                <button class="chip" style="font-size:0.75rem; padding:0.3rem 0.75rem;" onclick="filterConv('unread', this)">未讀</button>
            </div>
            <div id="convListContent">
                <div class="flex-center" style="padding:2rem"><div class="spinner"></div></div>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="tt-msg-empty">
                <img class="tt-msg-empty-logo" src="/static/img/tt-logo.png" alt="">
                <img class="tt-art-orchid tt-msg-empty-orchid" src="/static/img/neon-orchid.png" alt="">
                <img class="tt-msg-empty-skyline" src="/static/img/neon-skyline.png" alt="">
                <div class="tt-msg-empty-inner">
                    <h2 class="tt-msg-empty-title"><span class="tt-grad">今晚，</span><span class="tt-grad-pink">想和誰聊聊？</span></h2>
                    <p class="tt-msg-empty-sub">探索同頻的人，展開真實又有趣的對話。</p>
                    <div class="tt-msg-cards">
                        <div class="tt-msg-card tt-msg-card-l"><img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=320&h=400&fit=crop&crop=faces&q=80" alt=""></div>
                        <div class="tt-msg-card tt-msg-card-c"><img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=360&h=440&fit=crop&crop=faces&q=80" alt=""></div>
                        <div class="tt-msg-card tt-msg-card-r"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=320&h=400&fit=crop&crop=faces&q=80" alt=""></div>
                    </div>
                    <a href="/explore" class="btn btn-primary btn-lg tt-msg-cta">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-4px; margin-right:0.4rem;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        探索同頻的人
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/messages.js?v=20260504d"></script>
{% endblock %}
