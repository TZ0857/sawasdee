{% extends "components/base.html" %}
{% block title %}個人檔案{% endblock %}
{% block navbar %}{% include "components/navbar.html" %}{% endblock %}
{% block content %}<main class="main-content"><div class="container"><section class="profile-header tt-profile-header"><div class="profile-cover-placeholder" id="profileCover"></div><div class="profile-info"><div class="profile-avatar-placeholder" id="profileAvatar">TT</div><div class="tt-profile-copy"><div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap"><h1 class="profile-name" id="profileName">載入中…</h1><span class="badge hidden" id="premiumBadge">✦ Premium</span><span class="badge hidden" id="verifiedBadge">✓ 已驗證</span></div><p class="profile-meta" id="profileMeta"></p><div class="flex gap-2 mt-2" id="profileActions"></div></div></div></section><nav class="profile-tabs"><button class="profile-tab active" data-tab="info" onclick="switchTab('info')">關於</button><button class="profile-tab" data-tab="albums" onclick="switchTab('albums')">相簿</button><button class="profile-tab" data-tab="posts" onclick="switchTab('posts')">動態</button></nav><section id="tabInfo" class="tab-content"><div class="card"><div class="card-body" id="profileDetails"><div class="flex-center" style="padding:2rem"><div class="spinner"></div></div></div></div><div class="card mt-2" id="relationshipSection" style="display:none"><div class="card-body"><div class="tt-orchid-rule" style="margin-bottom:1rem">LOOKING FOR</div><div style="display:flex;flex-wrap:wrap;gap:.5rem" id="relationshipChips"></div></div></div><div class="card mt-2" id="atmosphereSection" style="display:none"><div class="card-body"><div class="tt-orchid-rule" style="margin-bottom:1rem">VIBE</div><div style="display:flex;flex-wrap:wrap;gap:.5rem" id="atmosphereChips"></div></div></div></section><section id="tabAlbums" class="tab-content hidden"><div class="tt-toolbar"><div class="tt-orchid-rule">PHOTO MOMENTS</div><button class="btn btn-primary btn-sm hidden" id="createAlbumBtn" onclick="showCreateAlbum()">建立相簿</button></div><div class="album-grid" id="albumGrid"></div></section><section id="tabPosts" class="tab-content hidden"><div id="profilePosts"></div></section></div></main>
<div class="modal-overlay hidden" id="createAlbumModal"><div class="modal-card"><div class="modal-header"><h3>建立相簿</h3><button class="modal-close" onclick="closeModal('createAlbumModal')">×</button></div><div class="form-group"><label class="form-label">相簿名稱</label><input type="text" class="form-input" id="albumTitle" placeholder="我的相簿"></div><div class="form-group"><label class="form-label">可見範圍</label><select class="form-select" id="albumType"><option value="public">公開相簿</option><option value="private">私人相簿（僅核准者）</option></select></div><button class="btn btn-primary btn-block" onclick="createAlbum()">建立相簿</button></div></div><div class="modal-overlay hidden" id="photoViewerModal"><div class="modal" style="max-width:700px;padding:0;background:transparent;border:0"><button class="modal-close" onclick="closeModal('photoViewerModal')" style="position:absolute;top:1rem;right:1rem;z-index:1">×</button><img id="photoViewerImg" style="width:100%;border-radius:var(--radius-lg)"></div></div>{% endblock %}
{% block scripts %}<script>const profileUsername="{{ username }}";</script><script src="/static/js/profile.js?v=20260623"></script>{% endblock %}
