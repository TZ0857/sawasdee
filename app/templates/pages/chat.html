{% extends "components/base.html" %}
{% block title %}聊天{% endblock %}
{% block navbar %}{% include "components/navbar.html" %}{% endblock %}
{% block content %}
<div class="main-content">
    <div class="container-sm chat-container" style="height:calc(100vh - 80px); display:flex; flex-direction:column;">
        <div class="chat-header" id="chatHeader">
            <a href="/messages" class="btn btn-ghost btn-sm">← 返回</a>
            <img src="" class="post-avatar" id="chatAvatar" alt="">
            <div style="flex:1;">
                <div style="display:flex; align-items:center; gap:0.4rem;">
                    <span class="conversation-name" id="chatName">Loading...</span>
                    <span class="badge hidden" id="chatVerified" style="background:var(--success); color:#fff; font-size:0.6rem; padding:0.1rem 0.3rem;">✓</span>
                </div>
                <div style="font-size:0.75rem; color:var(--text-muted)" id="chatStatus"></div>
            </div>
            <button class="btn btn-ghost btn-sm" id="translateToggle" onclick="toggleAutoTranslate()" title="AI 中泰即時翻譯" style="color:var(--gold);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                翻譯
            </button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="flex-center" style="flex:1"><div class="spinner"></div></div>
        </div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="messageInput" placeholder="輸入訊息... (支援中泰翻譯)">
            <button class="btn btn-primary" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>const chatUserId = "{{ user_id }}";</script>
<script src="/static/js/chat.js?v=2"></script>
{% endblock %}
