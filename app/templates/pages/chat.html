{% extends "components/base.html" %}
{% block title %}訊息{% endblock %}
{% block navbar %}{% include "components/navbar.html" %}{% endblock %}

{% block content %}
<main class="main-content">
    <div class="chat-desktop-wrap">
        <aside class="conversations-list chat-conv-sidebar" id="chatConvSidebar" aria-label="對話列表">
            <div class="tt-orchid-rule" style="margin:.9rem .75rem .6rem;">PRIVATE CONNECTIONS</div>
            <div style="padding:0 .6rem .8rem;">
                <input type="search" class="form-input" id="chatConvSearch" placeholder="搜尋對話" aria-label="搜尋對話">
            </div>
            <div class="filter-chips" style="padding:0 .6rem .9rem;">
                <button class="chip active" data-conv-filter="all" onclick="filterConvSidebar('all')" type="button">全部</button>
                <button class="chip" data-conv-filter="unread" onclick="filterConvSidebar('unread')" type="button">未讀</button>
            </div>
            <div id="chatConvList">
                <div class="flex-center" style="padding:2rem"><div class="spinner"></div></div>
            </div>
        </aside>

        <section class="container-sm chat-container" aria-label="私人聊天室">
            <header class="chat-header" id="chatHeader">
                <a href="/messages" class="btn btn-ghost btn-sm chat-back-mobile" aria-label="返回訊息">← <span>訊息</span></a>
                <img src="" class="post-avatar" id="chatAvatar" alt="對話對象頭像">
                <div style="flex:1; min-width:0;">
                    <div style="display:flex; align-items:center; gap:.45rem;">
                        <span class="conversation-name" id="chatName">載入中…</span>
                        <span class="badge hidden" id="chatVerified" aria-label="已驗證">✓</span>
                    </div>
                    <div id="chatStatus" aria-live="polite"></div>
                </div>
                <button class="btn btn-ghost btn-sm" id="translateToggle" onclick="toggleAutoTranslate()" title="AI 中泰即時翻譯" type="button" aria-label="切換 AI 翻譯">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span>翻譯</span>
                </button>
            </header>

            <div class="chat-messages" id="chatMessages" aria-live="polite">
                <div class="flex-center" style="flex:1"><div class="spinner"></div></div>
            </div>

            <div class="chat-reply-bar hidden" id="chatReplyBar">
                <div class="chat-reply-bar-line">↩</div>
                <div class="chat-reply-bar-body">
                    <div class="chat-reply-bar-name" id="chatReplyName">回覆訊息</div>
                    <div class="chat-reply-bar-preview" id="chatReplyPreview"></div>
                </div>
                <button class="chat-reply-bar-close" onclick="clearReply()" type="button" title="取消回覆" aria-label="取消回覆">×</button>
            </div>

            <div class="chat-recording hidden" id="chatRecording" aria-live="polite">
                <span class="chat-recording-dot"></span><span>錄音中</span>
                <span class="chat-recording-time" id="chatRecordingTime">0:00</span>
                <div style="flex:1"></div>
                <button class="btn btn-ghost btn-sm" onclick="cancelRecording()" type="button">取消</button>
                <button class="btn btn-primary btn-sm" onclick="stopRecording(true)" type="button">傳送</button>
            </div>

            <div class="chat-input-area" id="chatInputArea">
                <button class="btn btn-ghost chat-media-btn" type="button" title="傳送圖片" aria-label="傳送圖片" onclick="document.getElementById('chatImageInput').click()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>
                </button>
                <button class="btn btn-ghost chat-media-btn" type="button" title="傳送影片（60 秒／100 MB）" aria-label="傳送影片" onclick="document.getElementById('chatVideoInput').click()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                </button>
                <button class="btn btn-ghost chat-media-btn" type="button" title="錄製語音" aria-label="錄製語音" onclick="startRecording()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4m-4 0h8"/></svg>
                </button>
                <input type="file" id="chatImageInput" accept="image/*" hidden onchange="sendImageFile(this)">
                <input type="file" id="chatVideoInput" accept="video/*" hidden onchange="sendVideoFile(this)">
                <input type="text" class="chat-input" id="messageInput" placeholder="輸入訊息… 支援中泰翻譯" autocomplete="off">
                <button class="btn btn-primary" onclick="sendMessage()" type="button" aria-label="傳送訊息">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </div>

            <div class="chat-action-menu hidden" id="chatActionMenu">
                <button onclick="actionReply()" type="button">↩ 回覆</button>
                <button onclick="actionTranslate()" type="button" id="actionTranslateBtn">翻譯</button>
                <button onclick="actionRecall()" type="button" id="actionRecallBtn" class="chat-action-danger">收回</button>
            </div>
        </section>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script>const chatUserId = "{{ user_id }}";</script>
<script src="/static/js/chat.js?v=20260623"></script>
{% endblock %}
