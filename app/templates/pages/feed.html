{% extends "components/base.html" %}
{% block title %}動態牆{% endblock %}
{% block navbar %}{% include "components/navbar.html" %}{% endblock %}
{% block content %}
<div class="main-content">
    <div class="container-sm">
        <!-- Stories -->
        <div class="stories-bar" id="storiesBar"></div>

        <!-- Create Post -->
        <div class="card mb-3">
            <div class="card-body">
                <div style="display:flex; gap:0.8rem; align-items:flex-start;">
                    <img src="" class="post-avatar" id="feedAvatar" alt="">
                    <div style="flex:1">
                        <textarea class="form-textarea" id="postContent" placeholder="分享你的心情..." rows="2" style="min-height:60px"></textarea>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.8rem;">
                            <div class="flex gap-1">
                                <label class="btn btn-ghost btn-sm" style="cursor:pointer">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                                    照片
                                    <input type="file" accept="image/*" id="postImage" style="display:none">
                                </label>
                            </div>
                            <button class="btn btn-primary btn-sm" onclick="createPost()">發布</button>
                        </div>
                        <div id="imagePreview" class="hidden mt-1" style="position:relative">
                            <img id="previewImg" style="max-height:200px; border-radius:var(--radius-md)">
                            <button onclick="clearImage()" style="position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.6); border:none; color:#fff; border-radius:50%; width:24px; height:24px; cursor:pointer">×</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Posts Feed -->
        <div id="postsFeed">
            <div class="flex-center" style="padding:4rem;">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</div>

<!-- Comments Modal -->
<div class="modal-overlay" id="commentsModal">
    <div class="modal">
        <div class="modal-header">
            <h3>留言</h3>
            <button class="modal-close" onclick="closeComments()">×</button>
        </div>
        <div id="commentsList" style="max-height:300px; overflow-y:auto; margin-bottom:1rem;"></div>
        <div style="display:flex; gap:0.5rem;">
            <input type="text" class="form-input" id="commentInput" placeholder="寫留言...">
            <button class="btn btn-primary btn-sm" onclick="submitComment()">送出</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/feed.js"></script>
{% endblock %}
