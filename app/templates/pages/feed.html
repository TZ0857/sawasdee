{% extends "components/base.html" %}
{% block title %}動態{% endblock %}{% block navbar %}{% include "components/navbar.html" %}{% endblock %}{% block content %}<main class="main-content"><div class="container-sm"><header class="tt-page-head"><div class="tt-kicker">THE TT SOCIAL CLUB</div><h1 class="tt-page-title">動態</h1><p class="tt-page-subtitle">分享此刻的你，發現身邊正在發生的故事。</p></header><div class="filter-chips" style="margin-bottom:1rem"><button class="chip active" data-feed-filter="" onclick="filterFeed('')">全部動態</button><button class="chip" data-feed-filter="liked" onclick="filterFeed('liked')">我喜歡的</button></div><div class="stories-bar" id="storiesBar"></div><section class="card create-post mb-2"><div class="card-body"><div style="display:flex;gap:.75rem;align-items:flex-start"><img src="" class="post-avatar" id="feedAvatar" alt=""><div style="flex:1"><textarea class="form-textarea" id="postContent" placeholder="今天想分享什麼？" rows="2"></textarea><div style="display:flex;justify-content:space-between;gap:.5rem;margin-top:.7rem;flex-wrap:wrap"><div class="flex gap-1"><label class="btn btn-ghost btn-sm">相片<input type="file" accept="image/*" id="postImage" hidden></label><label class="btn btn-ghost btn-sm">影片<input type="file" accept="video/*" id="postVideo" hidden></label><button type="button" class="btn btn-ghost btn-sm" id="audioBtn" onclick="toggleRecording()"><span id="audioBtnLabel">語音</span></button></div><button class="btn btn-primary btn-sm" onclick="createPost()">發布</button></div><div id="imagePreview" class="hidden mt-1" style="position:relative"><img id="previewImg" style="max-height:180px;border-radius:var(--radius-md)"><button onclick="clearImage()" class="modal-close" style="position:absolute;top:4px;right:4px">×</button></div><div id="videoPreview" class="hidden mt-1" style="position:relative"><video id="previewVideo" controls style="max-height:240px;max-width:100%;border-radius:var(--radius-md)"></video><button onclick="clearVideo()" class="modal-close" style="position:absolute;top:4px;right:4px">×</button></div><div id="audioPreview" class="hidden mt-1"><audio id="previewAudio" controls></audio><button onclick="clearAudio()" class="btn btn-ghost btn-sm">移除</button></div></div></div></div></section><section id="postsFeed"><div class="flex-center" style="padding:4rem"><div class="spinner"></div></div></section><div class="hidden" id="feedEmpty"><div class="empty-state-card"><div class="empty-icon">✦</div><div class="empty-title">還沒有動態</div><div class="empty-desc">成為第一個分享這一刻的人。</div><button class="btn btn-primary btn-sm" onclick="document.getElementById('postContent').focus()">發布動態</button></div></div></div></main>{% endblock %}{% block scripts %}<script src="/static/js/feed.js?v=20260623"></script>{% endblock %}
