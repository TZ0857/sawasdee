{% extends "components/base.html" %}
{% block title %}動態{% endblock %}
{% block navbar %}{% include "components/navbar.html" %}{% endblock %}
{% block content %}
<div class="main-content">
    <div class="container-sm">
        <!-- Page Header -->
        <div class="page-header">
            <h2 class="page-title">動態</h2>
            <p class="page-subtitle">分享你的日常片刻，讓對的人更了解你</p>
        </div>

        <!-- Category Filters -->
        <div style="display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1.2rem;">
            <button class="chip active" onclick="filterFeed('')">全部</button>
            <button class="chip" onclick="filterFeed('daily')">日常</button>
            <button class="chip" onclick="filterFeed('food')">美食</button>
            <button class="chip" onclick="filterFeed('travel')">旅行</button>
            <button class="chip" onclick="filterFeed('nightlife')">夜生活</button>
            <button class="chip" onclick="filterFeed('mood')">心情</button>
        </div>

        <!-- Stories -->
        <div class="stories-bar" id="storiesBar"></div>

        <!-- Create Post -->
        <div class="card mb-2" style="border-radius:var(--radius-xl);">
            <div class="card-body" style="padding:1rem 1.2rem;">
                <div style="display:flex; gap:0.7rem; align-items:flex-start;">
                    <img src="" class="post-avatar" id="feedAvatar" alt="" style="width:36px; height:36px;">
                    <div style="flex:1">
                        <textarea class="form-textarea" id="postContent" placeholder="今天想分享什麼？" rows="2" style="min-height:56px; border-radius:var(--radius-md); background:var(--bg-elevated); border-color:var(--border); font-size:0.9rem;"></textarea>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.6rem;">
                            <label class="btn btn-ghost btn-sm" style="cursor:pointer; color:var(--text-muted);">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                                照片
                                <input type="file" accept="image/*" id="postImage" style="display:none">
                            </label>
                            <button class="btn btn-primary btn-sm" onclick="createPost()">發布</button>
                        </div>
                        <div id="imagePreview" class="hidden mt-1" style="position:relative">
                            <img id="previewImg" style="max-height:180px; border-radius:var(--radius-md)">
                            <button onclick="clearImage()" style="position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.6); border:none; color:#fff; border-radius:50%; width:22px; height:22px; cursor:pointer; font-size:0.85rem;">×</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Posts Feed -->
        <div id="postsFeed">
            <div class="flex-center" style="padding:4rem;">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="hidden" id="feedEmpty">
            <div class="empty-state-card">
                <div class="empty-icon">📝</div>
                <div class="empty-title">還沒有動態</div>
                <div class="empty-desc">分享第一個生活片刻，讓更多人看見你的日常</div>
                <button class="btn btn-primary btn-sm" onclick="document.getElementById('postContent').focus()">發布動態</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/feed.js?v=3"></script>
{% endblock %}
