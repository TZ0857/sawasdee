{% extends "components/base.html" %}
{% block title %}聚會聊天室{% endblock %}
{% block navbar %}{% include "components/navbar.html" %}{% endblock %}

{% block content %}
<main class="main-content">
    <div class="g-chat-layout">
        <aside class="g-chat-sidebar" id="gChatSidebar" aria-label="聚會聊天室列表">
            <div class="g-chat-sidebar-header">
                <a href="/gatherings" class="btn btn-ghost btn-sm">← 聚會</a>
            </div>
            <div class="tt-orchid-rule" style="padding:.85rem;">MY GATHERINGS</div>
            <div id="gChatList">
                <div class="flex-center" style="padding:2rem"><div class="spinner"></div></div>
            </div>
        </aside>

        <section class="g-chat-main" aria-label="聚會聊天室">
            <header class="g-chat-header" id="gChatHeader">
                <a href="/gatherings" class="btn btn-ghost btn-sm g-chat-back" aria-label="返回聚會">←</a>
                <div style="flex:1; min-width:0;">
                    <div class="g-chat-title" id="gChatTitle">載入中…</div>
                    <div class="g-chat-subtitle" id="gChatSubtitle"></div>
                </div>
                <button class="btn btn-ghost btn-sm" id="gAutoTrToggle" onclick="toggleGatheringAutoTranslate()" title="切換自動翻譯" type="button" aria-label="切換自動翻譯">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                </button>
                <button class="btn btn-ghost btn-sm" onclick="toggleMembersPanel()" title="成員清單" type="button" aria-label="查看成員">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </button>
                <button class="btn btn-ghost btn-sm" onclick="loadMessages(true)" title="重新整理" type="button" aria-label="重新整理訊息">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/></svg>
                </button>
            </header>

            <div class="g-members-panel hidden" id="gMembersPanel">
                <div class="g-members-panel-header">
                    <strong>聚會成員（<span id="gMemberCount">0</span>）</strong>
                    <button class="btn btn-ghost btn-sm" onclick="toggleMembersPanel()" type="button" aria-label="關閉成員清單">×</button>
                </div>
                <div id="gMembersList"></div>
            </div>

            <div class="g-chat-messages" id="gChatMessages" aria-live="polite">
                <div class="flex-center" style="flex:1"><div class="spinner"></div></div>
            </div>
            <div class="g-chat-input-area">
                <input type="text" class="chat-input" id="gChatInput" placeholder="跟聚會裡的人說點什麼…" maxlength="2000" autocomplete="off">
                <button class="btn btn-primary" onclick="sendMessage()" id="gChatSendBtn" type="button" aria-label="傳送訊息">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </div>
        </section>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script>const gatheringId = "{{ gathering_id }}";</script>
<script src="/static/js/gathering_chat.js?v=20260623"></script>
{% endblock %}
